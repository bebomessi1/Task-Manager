<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h1 { margin-bottom: 10px; }
        form { margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f5f5f5; }
        tr:nth-child(even) { background-color: #fafafa; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Task List</h1>
    <p><a href="{% url 'task_create' %}">Create New Task</a></p>

    <form method="get">
        <label for="status">Filter by status:</label>
        <select name="status" id="status" onchange="this.form.submit()">
            <option value="" {% if not selected_status %}selected{% endif %}>All</option>
            <option value="pending" {% if selected_status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="in_progress" {% if selected_status == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="done" {% if selected_status == 'done' %}selected{% endif %}>Done</option>
        </select>
    </form>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Updated At</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td><a href="{% url 'task_detail' task.id %}">{{ task.title }}</a></td>
                <td>{{ task.description }}</td>
                <td>{{ task.status }}</td>
                <td>{{ task.created_at }}</td>
                <td>{{ task.updated_at }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No tasks available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
